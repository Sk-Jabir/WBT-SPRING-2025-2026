<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jabir Portfolio Website</title>
    <link rel="stylesheet" href="../css/contactme.css">
</head>

<body>

    <header>
        <div class="navbar">
            <h1 class="logo">Sk. Jabir Hossain</span></h1>
            <nav>
                <ul class="nav-links">
                    <li><a href="../index.html">Home</a></li>
                    <li><a href="../html/experience.html">Experience</a></li>
                    <li><a href="../html/project.html">Projects</a></li>
                    <li><a href="../html/education.html">Education</a></li>
                    <li><a href="../html/contactme.html">Contact Me</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">


        <div class="form-container">
            <div class="form-header">
                <h1>Contact Me</h1>

            </div>
            <form action="#">

                <div class="form-row">

                    <div class="form-group">

                        <label for="fname">First Name:</label>

                        <input type="text" id="fname" required placeholder="Enter first name">

                    </div>

                    <div class="form-group">

                        <label for="lname">Last Name:</label>

                        <input type="text" id="lname" required placeholder="Enter last name">

                    </div>

                </div>



                <div class="form-group">

                    <label for="email">Email:</label>

                    <input type="email" id="email" required placeholder="example@email.com">

                </div>



                <div class="form-group">

                    <label for="company">Company</label>

                    <input type="text" id="company" placeholder="Organization name">

                </div>



                <fieldset class="radio-group">

                    <legend>Gender:</legend>

                    <label class="option-item">

                        <input type="radio" name="gender" value="male" required>

                        <span>Male</span>

                    </label>

                    <label class="option-item">

                        <input type="radio" name="gender" value="female">

                        <span>Female</span>

                    </label>

                </fieldset>



                <fieldset class="radio-group">

                    <legend>Reason of Contact: </legend>

                    <label class="option-item">

                        <input type="radio" name="reason" value="projects" required>

                        <span>Projects</span>

                    </label>

                    <label class="option-item">

                        <input type="radio" name="reason" value="thesis">

                        <span>Thesis</span>

                    </label>

                    <label class="option-item">

                        <input type="radio" name="reason" value="job">

                        <span>Job</span>

                    </label>

                </fieldset>



                <fieldset class="checkbox-group">

                    <legend>Topics:</legend>

                    <label class="option-item">

                        <input type="checkbox" name="topic" value="web">

                        <span>Web Development</span>

                    </label>

                    <label class="option-item">

                        <input type="checkbox" name="topic" value="mobile">

                        <span>Mobile Development</span>

                    </label>

                    <label class="option-item">

                        <input type="checkbox" name="topic" value="ai">

                        <span>AI/ML Development</span>

                    </label>

                </fieldset>



                <div class="form-group">

                    <label for="date">Consultation Date: </label>

                    <input type="date" id="date" required>

                </div>



                <div class="button-row">

                    <button type="submit" class="btn btn-submit">Submit</button>

                    <button type="reset" class="btn btn-reset">Reset</button>

                </div>

            </form>

        </div>








    </main>

    <footer>
        <div class="container footer-content">
            <p class="footertitle">Connect on Social Networks</p>
            <ul class="footer-icons">
                <li><a href="https://www.facebook.com/jabir.muzahid.2024"><img src="../data/icons8-facebook-100.png"
                            alt="Facebook"></a></li>
                <li><a href="https://www.linkedin.com/"><img src="../data/icons8-linkedin-100.png"
                            alt="LinkedIn"></a></li>
                <li><a href="https://github.com/Sk-Jabir"><img src="../data/icons8-github-logo-64.png" alt="GitHub"></a>
                </li>
            </ul>
            <p>&copy; 2026 Jabir Muzahid. All rights reserved.</p>
        </div>
    </footer>







</body>

</html>
